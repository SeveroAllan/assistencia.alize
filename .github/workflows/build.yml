name: Build and Release

on:
  push:
    tags:
      - 'v*' # Dispara quando você cria uma tag como v1.0.0

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run electron:build -- --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No macOS, para assinar o app, você precisaria de certificados da Apple
          # Se não tiver agora, ele vai gerar um app "não assinado"
